<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lead Scraper{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Lead Scraper</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/scrape" class="{% if request.path == '/scrape' %}active{% endif %}">New Scrape</a>
            <a href="/outreach" class="{% if request.path == '/outreach' %}active{% endif %}">Outreach</a>
            <a href="/sites" class="{% if request.path == '/sites' %}active{% endif %}">Live Sites</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
